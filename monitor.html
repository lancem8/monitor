    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Vitals values
        let currentHR = 75;
        let currentSpO2 = 98;
        let currentEtco2 = 38;

        // DOM elements
        const hrVal = document.getElementById('hr-val');
        const spo2Val = document.getElementById('spo2-val');
        const nibpVal = document.getElementById('nibp-val');
        const etco2Val = document.getElementById('etco2-val');

        // Setup Canvases
        const setupCanvas = (id) => {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            return { canvas, ctx };
        };

        const ecg = setupCanvas('ecgCanvas');
        const spo2 = setupCanvas('spo2Canvas');
        const capno = setupCanvas('capnoCanvas');

        // Waveform parameters
        let x = 0;
        const speed = 2.5; 
        
        function clearAhead(ctx, currentX, width, height) {
            ctx.clearRect(currentX, 0, 20, height);
        }

        let lastEcgY = ecg.canvas.height / 2;
        let lastSpo2Y = spo2.canvas.height * 0.7;
        let lastCapnoY = capno.canvas.height * 0.85;

        let ecgTimer = 0;
        let capnoTimer = 0;
        let beepTriggered = false;

        // Web Audio API Configuration
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playOximeterBeep(spo2Value) {
            if (!audioCtx || currentSpO2 <= 0) return;
            
            // Standard medical monitor scale: Calculate frequency based on SpO2 percentage
            // 100% SpO2 = ~750Hz, down to 70% SpO2 = ~400Hz
            const baseFreq = 400; 
            const freqStep = 11.6; 
            const frequency = baseFreq + (Math.max(70, spo2Value) - 70) * freqStep;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Short, crisp 120ms pulse oximeter beep duration
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function animate() {
            x += speed;
            if (x > ecg.canvas.width) x = 0;

            clearAhead(ecg.ctx, x, ecg.canvas.width, ecg.canvas.height);
            clearAhead(spo2.ctx, x, spo2.canvas.width, spo2.canvas.height);
            clearAhead(capno.ctx, x, capno.canvas.width, capno.canvas.height);

            // 1. ECG Waveform
            let ecgY = ecg.canvas.height / 2;
            const ecgCycleFrames = Math.max(20, (60 / currentHR) * 60 * (speed / 2)); 
            ecgTimer++;
            if (ecgTimer > ecgCycleFrames) {
                ecgTimer = 0;
                beepTriggered = false; // Reset tone trigger for the next heartbeat
            }

            if (ecgTimer > 0 && ecgTimer < 3) ecgY -= 5; 
            else if (ecgTimer >= 4 && ecgTimer <= 6) { 
                if (ecgTimer === 4) ecgY += 10;
                if (ecgTimer === 5) ecgY -= 45; 
                if (ecgTimer === 6) ecgY += 25;
            }
            else if (ecgTimer > 12 && ecgTimer < 18) ecgY -= 8; 

            ecg.ctx.beginPath();
            ecg.ctx.strokeStyle = '#00ff00';
            ecg.ctx.lineWidth = 2.5;
            ecg.ctx.moveTo(x - speed, lastEcgY);
            ecg.ctx.lineTo(x, ecgY);
            ecg.ctx.stroke();
            lastEcgY = ecgY;

            // 2. SpO2 Pleth Waveform & Audio Sync
            let spo2Y = spo2.canvas.height * 0.65;
            if (currentSpO2 > 0) {
                let plethDelay = ecgTimer - 8; 
                if (plethDelay > 0 && plethDelay < 25) {
                    spo2Y -= Math.sin((plethDelay / 25) * Math.PI) * 30; 
                    
                    // Trigger the audio beep precisely at the peak pulse inflection
                    if (plethDelay >= 6 && !beepTriggered) {
                        playOximeterBeep(currentSpO2);
                        beepTriggered = true;
                    }
                }
            }

            spo2.ctx.beginPath();
            spo2.ctx.strokeStyle = '#00ffff';
            spo2.ctx.lineWidth = 2.5;
            spo2.ctx.moveTo(x - speed, lastSpo2Y);
            spo2.ctx.lineTo(x, spo2Y);
            spo2.ctx.stroke();
            lastSpo2Y = spo2Y;

            // 3. Capnography Waveform
            let capnoY = capno.canvas.height * 0.85; 
            if (currentEtco2 > 0) {
                capnoTimer += 0.04;
                let capnoCycle = capnoTimer % (2 * Math.PI);
                
                if (capnoCycle < Math.PI * 0.8) {
                    capnoY = capno.canvas.height * 0.2; 
                } else if (capnoCycle >= Math.PI * 0.8 && capnoCycle < Math.PI * 1.0) {
                    let interpolation = (capnoCycle - (Math.PI * 0.8)) / (Math.PI * 0.2);
                    capnoY = (capno.canvas.height * 0.2) + (interpolation * (capno.canvas.height * 0.65));
                }
            }

            capno.ctx.beginPath();
            capno.ctx.strokeStyle = '#ff00ff';
            capno.ctx.lineWidth = 3;
            capno.ctx.moveTo(x - speed, lastCapnoY);
            capno.ctx.lineTo(x, capnoY);
            capno.ctx.stroke();
            lastCapnoY = capnoY;

            requestAnimationFrame(animate);
        }

        // Screen Wake Lock API & Sound Activation Trigger
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.message); }
        }

        // Browsers block audio until a user interaction occurs.
        // Tapping the tablet screen once activates the monitor audio context.
        window.addEventListener('click', () => {
            initAudio();
        });
        window.addEventListener('touchstart', () => {
            initAudio();
        });

        window.addEventListener('load', () => { requestWakeLock(); animate(); });
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        // Listen for updates from phone controller
        socket.on('vitalsChanged', (data) => {
            if(data.hr) { hrVal.innerText = data.hr; currentHR = parseInt(data.hr); }
            if(data.spo2) { spo2Val.innerText = data.spo2; currentSpO2 = parseInt(data.spo2); }
            if(data.nibp) nibpVal.innerText = data.nibp;
            if(data.etco2 !== undefined) {
                etco2Val.innerText = data.etco2;
                currentEtco2 = parseInt(data.etco2);
            }
        });
    </script>
</body>
</html>
