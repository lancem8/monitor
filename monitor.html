<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulation Monitor</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; }
        .monitor-grid { display: grid; grid-template-columns: 3fr 1fr; grid-template-rows: repeat(4, 1fr); height: 90vh; gap: 15px; }
        .trace-container { display: flex; align-items: center; background: #050505; border: 1px solid #222; padding: 10px; position: relative; }
        .numeric { display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 5rem; font-weight: bold; border-left: 2px solid #333; position: relative; }
        .label { font-size: 1.2rem; font-weight: bold; position: absolute; top: 10px; left: 15px; }
        
        /* High Contrast Color Coding */
        .ecg { color: #00ff00; }     
        .spo2 { color: #00ffff; }    
        .capno { color: #ff00ff; }   
        .nibp { color: #ffff00; }    
        
        canvas { width: 100%; height: 90px; }
        .static-wave-text { font-size: 2rem; font-weight: bold; margin-left: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="monitor-grid">
        <div class="trace-container ecg"><span class="static-wave-text">▲▼▲▼||||||▲▼▲▼</span></div>
        <div class="numeric ecg"><div class="label">HR</div><span id="hr-val">75</span></div>

        <div class="trace-container spo2"><span class="static-wave-text">~~~~~~~/~~~~~~~</span></div>
        <div class="numeric spo2"><div class="label">SpO2 %</div><span id="spo2-val">98</span></div>

        <div class="trace-container capno"><canvas id="capnoCanvas"></canvas></div>
        <div class="numeric capno"><div class="label">EtCO2</div><span id="etco2-val">38</span></div>

        <div class="trace-container nibp"><span class="static-wave-text">Non-Invasive Blood Pressure</span></div>
        <div class="numeric nibp"><div class="label">NIBP</div><span id="nibp-val" style="font-size: 4rem;">120/80</span></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Dynamic Vitals Tracking
        let currentHR = 75;
        let currentSpO2 = 98;
        let currentEtco2 = 38;

        const hrVal = document.getElementById('hr-val');
        const spo2Val = document.getElementById('spo2-val');
        const nibpVal = document.getElementById('nibp-val');
        const etco2Val = document.getElementById('etco2-val');

        // Capnography Canvas Setup
        const canvas = document.getElementById('capnoCanvas');
        const ctx = canvas.getContext('2d');
        
        // Force explicit dimensions so canvas drawing won't fail
        canvas.width = 600;
        canvas.height = 90;

        let step = 0;

        function drawCapnography() {
            step += 2; // Speed of wave movement
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            for (let i = 0; i < canvas.width; i++) {
                let y = 75; // Baseline floor (near bottom of canvas)
                
                if (currentEtco2 > 0) {
                    let cycle = (i + step) % 120; // Length of a breath cycle
                    if (cycle > 30 && cycle < 90) {
                        y = 15; // Alveolar plateau (Taller wave, closer to top of canvas)
                    }
                }
                
                if (i === 0) ctx.moveTo(i, y);
                else ctx.lineTo(i, y);
            }
            ctx.stroke();
            requestAnimationFrame(drawCapnography);
        }
        drawCapnography();

        // Web Audio Synth for SpO2 Beep
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let beepInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                startBeepLoop();
            }
        }

        function playBeep() {
            if (!audioCtx || currentSpO2 <= 0) return;

            // Calculate precise clinical pitch based on SpO2 (100% = 750Hz, 70% = 400Hz)
            const frequency = 400 + (Math.max(70, currentSpO2) - 70) * 11.6;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // Keep the beep repeating automatically based on the current Heart Rate
        function startBeepLoop() {
            if (beepInterval) clearInterval(beepInterval);
            
            const intervalMs = (60 / currentHR) * 1000;
            beepInterval = setInterval(() => {
                playBeep();
            }, intervalMs);
        }

        // Activate audio context on first screen interaction
        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        // Wake Lock to keep screen awake
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.message); }
        }
        window.addEventListener('load', requestWakeLock);

        // Receive real-time phone instructions
        socket.on('vitalsChanged', (data) => {
            if(data.hr) { 
                hrVal.innerText = data.hr; 
                currentHR = parseInt(data.hr);
                if (audioCtx) startBeepLoop(); // Dynamically recalibrate beep speed to match new HR
            }
            if(data.spo2) { 
                spo2Val.innerText = data.spo2; 
                currentSpO2 = parseInt(data.spo2); 
            }
            if(data.nibp) {
                nibpVal.innerText = data.nibp;
            }
            if(data.etco2 !== undefined) {
                etco2Val.innerText = data.etco2;
                currentEtco2 = parseInt(data.etco2);
            }
        });
    </script>
</body>
</html>
