<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulation Monitor</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; }
        .monitor-grid { display: grid; grid-template-columns: 3fr 1fr; grid-template-rows: repeat(4, 1fr); height: 90vh; gap: 15px; }
        .trace-container { background: #050505; border: 1px solid #222; padding: 10px; position: relative; overflow: hidden; display: flex; align-items: center; }
        .numeric { display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 5rem; font-weight: bold; border-left: 2px solid #333; position: relative; line-height: 1; }
        .label { font-size: 1.2rem; font-weight: bold; position: absolute; top: 10px; left: 15px; }
        
        /* High Contrast Color Coding */
        .ecg { color: #00ff00; }     
        .spo2 { color: #00ffff; }    
        .capno { color: #ff00ff; }   
        .nibp { color: #ffff00; }    
        
        .nibp-text { font-size: 4rem; }

        /* Smooth CSS Waveform Animation Layout */
        .wave-svg {
            position: absolute;
            left: 0;
            top: 10px;
            height: 80%;
            width: 200%; /* Double width to allow seamless looping */
            animation: moveWave 4s linear infinite;
        }

        @keyframes moveWave {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="monitor-grid">
        <div class="trace-container ecg">
            <svg class="wave-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path d="M0,50 L100,50 L110,45 L115,50 L125,50 L130,20 L135,85 L140,50 L160,50 L175,40 L190,50 L300,50 L310,45 L315,50 L325,50 L330,20 L335,85 L340,50 L360,50 L375,40 L390,50 L500,50 L510,45 L515,50 L525,50 L530,20 L535,85 L540,50 L560,50 L575,40 L590,50 L700,50 L710,45 L715,50 L725,50 L730,20 L735,85 L740,50 L760,50 L775,40 L790,50 L900,50 L910,45 L915,50 L925,50 L930,20 L935,85 L940,50 L960,50 L975,40 L990,50 L1000,50" fill="none" stroke="#00ff00" stroke-width="3"/>
            </svg>
        </div>
        <div class="numeric ecg"><div class="label">HR</div><span id="hr-val">75</span></div>

        <div class="trace-container spo2">
            <svg id="spo2Wave" class="wave-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path d="M0,70 Q25,20 40,55 T80,70 L100,70 M100,70 Q125,20 140,55 T180,70 L200,70 M200,70 Q225,20 240,55 T280,70 L300,70 M300,70 Q325,20 340,55 T380,70 L400,70 M400,70 Q425,20 440,55 T480,70 L500,70 M500,70 Q525,20 540,55 T580,70 L600,70 M600,70 Q625,20 640,55 T680,70 L700,70 M700,70 Q725,20 740,55 T780,70 L800,70 M800,70 Q825,20 840,55 T880,70 L900,70 M900,70 Q925,20 940,55 T980,70 L1000,70" fill="none" stroke="#00ffff" stroke-width="3"/>
            </svg>
        </div>
        <div class="numeric spo2"><div class="label">SpO2 %</div><span id="spo2-val">98</span></div>

        <div class="trace-container capno">
            <svg id="capnoWave" class="wave-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path d="M0,80 L30,80 L35,20 L80,20 L85,80 L150,80 L155,20 L200,20 L205,80 L270,80 L275,20 L320,20 L325,80 L390,80 L395,20 L440,20 L445,80 L510,80 L515,20 L560,20 L565,80 L630,80 L635,20 L680,20 L685,80 L750,80 L755,20 L800,20 L805,80 L870,80 L875,20 L920,20 L925,80 L1000,80" fill="none" stroke="#ff00ff" stroke-width="3.5"/>
            </svg>
        </div>
        <div class="numeric capno"><div class="label">EtCO2</div><span id="etco2-val">38</span></div>

        <div class="trace-container nibp"><span style="font-size: 1.8rem; font-weight: bold; margin-left: 20px; opacity: 0.5;">NIBP (mmHg)</span></div>
        <div class="numeric nibp"><div class="label">NIBP</div><span id="nibp-val" class="nibp-text">120/80</span></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let currentHR = 75;
        let currentSpO2 = 98;
        let currentEtco2 = 38;

        const hrVal = document.getElementById('hr-val');
        const spo2Val = document.getElementById('spo2-val');
        const nibpVal = document.getElementById('nibp-val');
        const etco2Val = document.getElementById('etco2-val');
        
        const spo2Wave = document.getElementById('spo2Wave');
        const capnoWave = document.getElementById('capnoWave');

        // Web Audio Synth for SpO2 Beep
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let beepInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                startBeepLoop();
            }
        }

        function playBeep() {
            if (!audioCtx || currentSpO2 <= 0) return;

            // Clinical pitch scale based on SpO2 (100% = 750Hz, 70% = 400Hz)
            const frequency = 400 + (Math.max(70, currentSpO2) - 70) * 11.6;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function startBeepLoop() {
            if (beepInterval) clearInterval(beepInterval);
            
            const intervalMs = (60 / currentHR) * 1000;
            beepInterval = setInterval(() => {
                playBeep();
            }, intervalMs);
        }

        // Activate audio context on click/tap
        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio);

        // Wake Lock
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.message); }
        }
        window.addEventListener('load', requestWakeLock);

        // Receive real-time phone instructions
        socket.on('vitalsChanged', (data) => {
            if(data.hr) { 
                hrVal.innerText = data.hr; 
                currentHR = parseInt(data.hr);
                if (audioCtx) startBeepLoop(); 
            }
            if(data.spo2) { 
                spo2Val.innerText = data.spo2; 
                currentSpO2 = parseInt(data.spo2); 
                
                // If SpO2 drops to 0, hide the pleth wave completely
                if (currentSpO2 <= 0) spo2Wave.style.display = 'none';
                else spo2Wave.style.display = 'block';
            }
            if(data.nibp) {
                nibpVal.innerText = data.nibp;
            }
            if(data.etco2 !== undefined) {
                etco2Val.innerText = data.etco2;
                currentEtco2 = parseInt(data.etco2);
                
                // If EtCO2 drops to 0 (Apnea), hide the capno wave to show flatline
                if (currentEtco2 <= 0) capnoWave.style.display = 'none';
                else capnoWave.style.display = 'block';
            }
        });
    </script>
</body>
</html>
