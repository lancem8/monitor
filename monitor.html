<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulation Monitor</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow: hidden; }
        .monitor-grid { display: grid; grid-template-columns: 3.5fr 1fr; grid-template-rows: repeat(4, 1fr); height: 92vh; gap: 10px; }
        
        .trace-container { display: flex; align-items: center; background: #000; border-bottom: 1px solid #222; padding: 5px; position: relative; }
        .numeric { display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 4.5rem; font-weight: bold; border-left: 2px solid #222; line-height: 1; }
        .label { font-size: 1.1rem; font-weight: bold; margin-bottom: 2px; align-self: flex-start; padding-left: 15px; position: absolute; top: 10px; }
        
        /* Color Coding */
        .ecg { color: #00ff00; }     
        .spo2 { color: #00ffff; }    
        .nibp { color: #ffff00; }    
        .capno { color: #ff00ff; }   
        
        canvas { width: 100%; height: 110px; }
        .nibp-text { font-size: 3.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="monitor-grid">
        <div class="trace-container ecg"><canvas id="ecgCanvas"></canvas></div>
        <div class="numeric ecg"><div class="label">HR</div><span id="hr-val">75</span></div>

        <div class="trace-container spo2"><canvas id="spo2Canvas"></canvas></div>
        <div class="numeric spo2"><div class="label">SpO2 %</div><span id="spo2-val">98</span></div>

        <div class="trace-container capno"><canvas id="capnoCanvas"></canvas></div>
        <div class="numeric capno"><div class="label">EtCO2</div><span id="etco2-val">38</span></div>

        <div class="trace-container nibp"><span style="font-size: 1.8rem; font-weight: bold; margin-left: 20px;">NIBP (mmHg)</span></div>
        <div class="numeric nibp"><div class="label">NIBP</div><span id="nibp-val" class="nibp-text">120/80</span></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Vitals values
        let currentHR = 75;
        let currentSpO2 = 98;
        let currentEtco2 = 38;

        // DOM elements
        const hrVal = document.getElementById('hr-val');
        const spo2Val = document.getElementById('spo2-val');
        const nibpVal = document.getElementById('nibp-val');
        const etco2Val = document.getElementById('etco2-val');

        // Setup Canvases
        const setupCanvas = (id) => {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            return { canvas, ctx };
        };

        const ecg = setupCanvas('ecgCanvas');
        const spo2 = setupCanvas('spo2Canvas');
        const capno = setupCanvas('capnoCanvas');

        // Waveform parameters
        let x = 0;
        const speed = 2.5; // Sweep speed of trace line
        
        // Clear columns ahead of the sweep bar to create a real monitor gap look
        function clearAhead(ctx, currentX, width, height) {
            ctx.clearRect(currentX, 0, 20, height);
        }

        // Math for drawing the dynamic curves
        let lastEcgY = ecg.canvas.height / 2;
        let lastSpo2Y = spo2.canvas.height * 0.7;
        let lastCapnoY = capno.canvas.height * 0.85;

        let ecgTimer = 0;
        let capnoTimer = 0;

        function animate() {
            x += speed;
            if (x > ecg.canvas.width) x = 0;

            clearAhead(ecg.ctx, x, ecg.canvas.width, ecg.canvas.height);
            clearAhead(spo2.ctx, x, spo2.canvas.width, spo2.canvas.height);
            clearAhead(capno.ctx, x, capno.canvas.width, capno.canvas.height);

            // 1. ECG Waveform Logic (Dynamic timing calculated by HR)
            let ecgY = ecg.canvas.height / 2;
            const ecgCycleFrames = Math.max(20, (60 / currentHR) * 60 * (speed / 2)); 
            ecgTimer++;
            if (ecgTimer > ecgCycleFrames) ecgTimer = 0;

            if (ecgTimer > 0 && ecgTimer < 3) ecgY -= 5; // P wave
            else if (ecgTimer >= 4 && ecgTimer <= 6) { // QRS Complex
                if (ecgTimer === 4) ecgY += 10;
                if (ecgTimer === 5) ecgY -= 45; // Tall R spike
                if (ecgTimer === 6) ecgY += 25;
            }
            else if (ecgTimer > 12 && ecgTimer < 18) ecgY -= 8; // T wave

            ecg.ctx.beginPath();
            ecg.ctx.strokeStyle = '#00ff00';
            ecg.ctx.lineWidth = 2.5;
            ecg.ctx.moveTo(x - speed, lastEcgY);
            ecg.ctx.lineTo(x, ecgY);
            ecg.ctx.stroke();
            lastEcgY = ecgY;

            // 2. SpO2 Pleth Waveform Logic (Tied directly to the ECG cycle)
            let spo2Y = spo2.canvas.height * 0.65;
            if (currentSpO2 > 0) {
                let plethDelay = ecgTimer - 8; // Pleth wave follows the QRS pulse slightly
                if (plethDelay > 0 && plethDelay < 25) {
                    spo2Y -= Math.sin((plethDelay / 25) * Math.PI) * 30; // Smooth pulse wave
                }
            }

            spo2.ctx.beginPath();
            spo2.ctx.strokeStyle = '#00ffff';
            spo2.ctx.lineWidth = 2.5;
            spo2.ctx.moveTo(x - speed, lastSpo2Y);
            spo2.ctx.lineTo(x, spo2Y);
            spo2.ctx.stroke();
            lastSpo2Y = spo2Y;

            // 3. Taller, Sharp Capnography Waveform Logic (Independent Respiratory Rate)
            let capnoY = capno.canvas.height * 0.85; // Baseline floor
            
            if (currentEtco2 > 0) {
                capnoTimer += 0.04;
                let capnoCycle = capnoTimer % (2 * Math.PI);
                
                // Creates a crisp, square Alveolar Plateau
                if (capnoCycle < Math.PI * 0.8) {
                    // Expired phase: Taller wave scaling up to max height
                    capnoY = capno.canvas.height * 0.2; 
                } else if (capnoCycle >= Math.PI * 0.8 && capnoCycle < Math.PI * 1.0) {
                    // Sharp drop off down to baseline (Inspiration)
                    let interpolation = (capnoCycle - (Math.PI * 0.8)) / (Math.PI * 0.2);
                    capnoY = (capno.canvas.height * 0.2) + (interpolation * (capno.canvas.height * 0.65));
                }
            }

            capno.ctx.beginPath();
            capno.ctx.strokeStyle = '#ff00ff';
            capno.ctx.lineWidth = 3;
            capno.ctx.moveTo(x - speed, lastCapnoY);
            capno.ctx.lineTo(x, capnoY);
            capno.ctx.stroke();
            lastCapnoY = capnoY;

            requestAnimationFrame(animate);
        }

        // Screen Wake Lock API
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(err.message); }
        }
        window.addEventListener('load', () => { requestWakeLock(); animate(); });
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        // Listen for phone instructions
        socket.on('vitalsChanged', (data) => {
            if(data.hr) { hrVal.innerText = data.hr; currentHR = parseInt(data.hr); }
            if(data.spo2) { spo2Val.innerText = data.spo2; currentSpO2 = parseInt(data.spo2); }
            if(data.nibp) nibpVal.innerText = data.nibp;
            if(data.etco2 !== undefined) {
                etco2Val.innerText = data.etco2;
                currentEtco2 = parseInt(data.etco2);
            }
        });
    </script>
</body>
</html>
